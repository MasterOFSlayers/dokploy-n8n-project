version: '3.8'
services:
  dokploy-postgres:
    image: postgres:16
    container_name: dokploy-postgres
    environment:
      POSTGRES_USER: dokploy
      POSTGRES_PASSWORD: dokploy
      POSTGRES_DB: dokploy
    volumes:
      - dokploy-postgres-data:/var/lib/postgresql/data
    restart: always

  dokploy-redis:
    image: redis:7-alpine
    container_name: dokploy-redis
    restart: always

  dokploy:
    image: dokploy/dokploy:latest
    container_name: dokploy
    depends_on:
      - dokploy-postgres
      - dokploy-redis
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dokploy-data:/data
    environment:
      POSTGRES_URL: postgresql://dokploy:dokploy@dokploy-postgres:5432/dokploy
      REDIS_URL: redis://dokploy-redis:6379
    restart: always

volumes:
  dokploy-postgres-data:
  dokploy-data:
